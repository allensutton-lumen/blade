name: CI

on:
  pull_request:
    branches: [main, dev, prod]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  frontend-check:
    name: Frontend - typecheck + lint + unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run lint
      - run: npm run test:ci
      - run: npm audit --audit-level=high --omit=dev

  backend-check:
    name: Backend - typecheck + lint + unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run lint
      - run: npm test
        env:
          NODE_ENV: test
      - run: npm audit --audit-level=high --omit=dev
